<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>每日看点推送</title>
    <meta
      name="description"
      content="聚焦六大支柱产业、六大未来产业、国际局势、AI、半导体、国际法与商业分析的每日重要资讯页面。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Public+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero__backdrop"></div>
        <div class="hero__content">
          <p class="eyebrow">Daily Briefing</p>
          <h1>每日看点推送</h1>
          <p class="hero__lead">
            覆盖产业、科技、国际与商业的重要动态，用克制的信息设计承载每天最值得关注的新闻线索。
          </p>
          <div class="hero__meta">
            <div>
              <span class="meta-label">更新日期</span>
              <strong id="publish-date">加载中</strong>
            </div>
            <div>
              <span class="meta-label">更新频率</span>
              <strong>每日刷新</strong>
            </div>
            <div>
              <span class="meta-label">内容范围</span>
              <strong>中外来源并行</strong>
            </div>
          </div>
        </div>
      </header>

      <main class="layout">
        <aside class="sidebar">
          <section class="panel panel--sticky">
            <p class="panel__eyebrow">栏目导航</p>
            <nav id="topic-nav" class="topic-nav" aria-label="栏目导航"></nav>
          </section>

          <section class="panel">
            <p class="panel__eyebrow">今日摘要</p>
            <div id="highlights" class="highlights"></div>
          </section>
        </aside>

        <section class="content">
          <section class="panel panel--intro">
            <div class="panel__header">
              <div>
                <p class="panel__eyebrow">Brief Overview</p>
                <h2>面向日更的资讯首页</h2>
              </div>
              <p class="intro-note">
                每个栏目固定展示 2 条重点内容与多条其他看点，所有内容都带独立原文跳转入口。
              </p>
            </div>
          </section>

          <div id="topic-sections" class="topic-sections"></div>
        </section>
      </main>
    </div>

    <template id="nav-item-template">
      <a class="topic-nav__link"></a>
    </template>

    <template id="highlight-template">
      <article class="highlight-card">
        <p class="highlight-card__topic"></p>
        <h3 class="highlight-card__title"></h3>
        <p class="highlight-card__summary"></p>
      </article>
    </template>

    <template id="section-template">
      <section class="topic-section panel">
        <div class="panel__header">
          <div>
            <p class="panel__eyebrow section-tag"></p>
            <h2 class="topic-section__title"></h2>
          </div>
          <p class="topic-section__description"></p>
        </div>
        <div class="section-summary">
          <span class="section-summary__chip section-summary__chip--primary"></span>
          <span class="section-summary__chip section-summary__chip--secondary"></span>
        </div>
        <div class="cards-grid"></div>
        <div class="briefs-block">
          <div class="briefs-block__header">
            <h3 class="briefs-block__title">Quick Scan</h3>
            <p class="briefs-block__note">略重要内容也单独列出，支持直接点进原文。</p>
          </div>
          <div class="briefs-list"></div>
        </div>
      </section>
    </template>

    <template id="card-template">
      <article class="news-card">
        <div class="news-card__header">
          <span class="news-card__priority"></span>
          <span class="news-card__time"></span>
        </div>
        <h3 class="news-card__title">
          <a class="news-card__title-link" target="_blank" rel="noreferrer"></a>
        </h3>
        <p class="news-card__summary"></p>
        <p class="news-card__impact"></p>
        <div class="news-card__source-block">
          <span class="news-card__source"></span>
          <a class="news-card__source-url" target="_blank" rel="noreferrer"></a>
        </div>
        <div class="news-card__footer">
          <a class="news-card__link" target="_blank" rel="noreferrer">click</a>
        </div>
      </article>
    </template>

    <template id="brief-template">
      <article class="brief-item">
        <span class="brief-item__badge"></span>
        <div class="brief-item__body">
          <p class="brief-item__text"></p>
        </div>
        <div class="brief-item__meta">
          <span class="brief-item__source"></span>
          <a class="brief-item__link" target="_blank" rel="noreferrer">click</a>
        </div>
      </article>
    </template>

    <script src="./data/daily-brief.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
